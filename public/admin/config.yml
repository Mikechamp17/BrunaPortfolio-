# ─────────────────────────────────────────────────────────
# PHOZARO Admin — Decap CMS config
# OAuth proxy: sparkling-creponne-c2cf76.netlify.app
# GitHub OAuth App: Mikechamp17 / PHOZARO Admin
# ─────────────────────────────────────────────────────────

backend:
  name: github
  repo: Mikechamp17/BrunaPortfolio-   # GitHub repo: owner/repo-name
  branch: main
  base_url: https://sparkling-creponne-c2cf76.netlify.app

# Where uploaded images are saved in the repo
media_folder: src/assets/uploads

# How that path is written into content files
# (relative from src/content/projects/ up to src/assets/uploads/)
public_folder: ../../assets/uploads

# ─────────────────────────────────────────────
# COLLECTIONS
# ─────────────────────────────────────────────

collections:

  # ── Projects (main portfolio — Bruna uses this most) ──
  - name: projects
    label: Portfolio Projects
    label_singular: Project
    folder: src/content/projects
    format: json
    extension: json
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - label: Project Title
        name: title
        widget: string
        hint: "e.g. Gaura Sumer Campaign"

      - label: URL Slug
        name: slug
        widget: string
        hint: "URL-safe version of the title — lowercase, hyphens only. e.g. gaura-sumer-campaign"
        pattern: ['^[a-z0-9-]+$', "Lowercase letters, numbers, and hyphens only"]

      - label: Category
        name: category
        widget: select
        options:
          - { label: "Multimedia Marketing", value: "marketing" }
          - { label: "Personal Work",        value: "personal"  }

      - label: Display Order
        name: order
        widget: number
        value_type: int
        min: 1
        hint: "Lower number = appears first in the list"

      - label: Project Description
        name: description
        widget: text
        hint: "2–3 sentences about the project. Shown on the project page."

      - label: Cover Image
        name: coverImage
        widget: image
        hint: "Main image shown in the hero on the project page"
        media_folder: /src/assets/uploads
        public_folder: "../../assets/uploads"

      - label: Gallery Images
        name: images
        widget: list
        required: false
        hint: "Additional photos shown in the gallery grid on the project page"
        field:
          label: Image
          name: image
          widget: image
          media_folder: /src/assets/uploads
          public_folder: "../../assets/uploads"

      - label: Vimeo ID
        name: vimeoId
        widget: string
        required: false
        hint: "Optional. The number from a Vimeo URL — e.g. for vimeo.com/76979871 enter 76979871"

  # ── Site Settings ──────────────────────────────────────
  - name: settings
    label: Site Settings
    files:
      - label: Site Info
        name: site
        file: src/data/site.json
        fields:
          - { label: "Your Name / Brand",  name: name,        widget: string }
          - { label: Tagline,              name: tagline,     widget: string }
          - { label: Location,             name: location,    widget: string }
          - { label: Year Started,         name: yearStarted, widget: number, value_type: int }
          - { label: Email Address,        name: email,       widget: string }
          - { label: Instagram Handle,     name: instagram,   widget: string, hint: "Include the @ symbol" }
          - { label: Vimeo URL,            name: vimeo,       widget: string }

  # ── Videos (showreel) ─────────────────────────────────
  - name: videos
    label: Videos
    label_singular: Video
    folder: src/content/videos
    format: json
    extension: json
    create: true
    fields:
      - { label: Title,      name: title,   widget: string }
      - label: Vimeo ID
        name: vimeoId
        widget: string
        hint: "The number from the Vimeo URL — e.g. 76979871"
      - label: Poster Image
        name: poster
        widget: image
        media_folder: /src/assets/video-posters
        public_folder: "../../assets/video-posters"
      - { label: Order, name: order, widget: number, value_type: int }
